name: Refresh prices

on:
  schedule:
    - cron: "*/20 11-16 * * *"   # every 20 min, ~5–11am CST (6am–noon CDT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Square prices
        run: node scripts/fetch-square-prices.mjs
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}

      - name: Commit if changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain app/square-snapshot.json app/featured.json)" ]; then
            git config user.name "prices-bot"
            git config user.email "actions@users.noreply.github.com"
            git add app/square-snapshot.json app/featured.json
            git commit -m "chore: refresh Square prices"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "No price changes."
          fi

      # A push made with GITHUB_TOKEN doesn't trigger deploy.yml, so deploy here.
      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: pnpm build
        env:
          BUILD_ID: ${{ steps.commit.outputs.sha }}

      - name: Deploy to Cloudflare Workers
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
