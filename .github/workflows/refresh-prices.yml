name: Refresh prices

on:
  schedule:
    - cron: "*/20 11-16 * * *"   # every 20 min, ~5–11am CST (6am–noon CDT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Square prices
        run: node scripts/fetch-square-prices.mjs
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}

      - name: Commit if changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain app/square-snapshot.json app/featured.json)" ]; then
            git config user.name "prices-bot"
            git config user.email "actions@users.noreply.github.com"
            git add app/square-snapshot.json app/featured.json
            git commit -m "chore: refresh Square prices"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "No price changes."
          fi

  # A GITHUB_TOKEN push doesn't trigger deploy.yml, so call the shared deploy directly.
  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.refresh.outputs.sha }}
      build_id: ${{ needs.refresh.outputs.sha }}
    secrets: inherit
