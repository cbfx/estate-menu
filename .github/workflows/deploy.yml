name: Deploy

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: Commit/ref to build and deploy
        type: string
        required: false
        default: ""
      build_id:
        description: BUILD_ID baked into the build (drives kiosk auto-reload)
        type: string
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          BUILD_ID: ${{ inputs.build_id || github.sha }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
